// spot@public.miniTicker.v3.api
// https://github.com/mexcdevelop/websocket-proto/blob/main/PublicMiniTickerV3Api.proto
syntax = "proto3";

package sidecar.mexc;

option go_package = "providers/websockets/mexc/proto";

import "sidecar/mexc/response.proto";

message PushDataV3ApiWrapper {
  string channel = 1;
  oneof body {
    PublicMiniTickerV3Api publicMiniTicker = 309;
  }
  optional string symbol = 3;
  optional string symbolId = 4;
  optional int64 createTime = 5;
  optional int64 sendTime = 6;
}
